name: drawio-mcp

services:
  image-export:
    image: jgraph/export-server
    expose:
      - "8000"
    environment:
      DRAWIO_BASE_URL: http://localhost:8080
    volumes:
      - fonts:/usr/share/fonts/drawio

  drawio:
    image: jgraph/drawio
    depends_on:
      - image-export
    ports:
      - "${DRAWIO_HOST:-127.0.0.1}:${DRAWIO_HTTP_PORT:-8080}:8080"
      - "${DRAWIO_HOST:-127.0.0.1}:${DRAWIO_HTTPS_PORT:-8443}:8443"
    environment:
      DRAWIO_SELF_CONTAINED: "1"
      EXPORT_URL: http://image-export:8000/
      DRAWIO_SERVER_URL: http://localhost:8080/
      DRAWIO_BASE_URL: http://localhost:8080

  mcp:
    image: drawio-mcp-mcp
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - drawio
    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-3001}:${MCP_PORT:-3001}"
    environment:
      DRAWIO_BASE_URL: ${DRAWIO_BASE_URL:-http://localhost:8080/}
      DRAWIO_OUTPUT_DIR: ${DOCKER_DRAWIO_OUTPUT_DIR:-/data/diagrams}
      MCP_PORT: ${MCP_PORT:-3001}
      MCP_LISTEN: ${DOCKER_MCP_LISTEN:-0.0.0.0}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      OPEN_BROWSER: ${OPEN_BROWSER:-0}
      VIEWER_PATH: ${DOCKER_VIEWER_PATH:-/app/viewer}
    volumes:
      - diagrams:/data/diagrams

volumes:
  fonts:
  diagrams:
